<div class="config-page">
  <h2 class="page-titulo">Módulos</h2>

  <div class="tabla-card">
    <div class="tabla-toolbar">
      <input
        class="buscador"
        type="text"
        placeholder="Buscar..."
        [(ngModel)]="busqueda"
        (input)="buscar()"
      />
      <button class="btn-agregar" (click)="abrirAgregar()">
        <i class="fa-solid fa-circle-plus"></i> Agregar Módulo
      </button>
    </div>

    <div *ngIf="cargando" class="cargando">Cargando...</div>

    <table *ngIf="!cargando" class="tabla">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Descripción</th>
          <th>Área</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let m of modulosFiltrados">
          <td>{{ m.nombre_m }}</td>
          <td>{{ m.descripcion_m }}</td>
          <td>{{ m.nombre_area || '—' }}</td>
          <td>
            <button class="btn-icono" (click)="abrirEditar(m)">
              <i class="fa-solid fa-pen"></i>
            </button>
          </td>
        </tr>
        <tr *ngIf="modulosFiltrados.length === 0">
          <td colspan="4" class="sin-datos">Sin resultados</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- NOTIFICACION -->
<div class="notificacion"
     *ngIf="notificacionVisible"
     [class.notificacion-error]="notificacionTipo === 'error'">
  <i class="fa-solid"
     [class.fa-circle-check]="notificacionTipo === 'exito'"
     [class.fa-circle-xmark]="notificacionTipo === 'error'">
  </i>
  {{ notificacion }}
</div>

<!-- MODAL -->
<div class="modal-overlay" *ngIf="modalAbierto" (click)="cerrarModal()"></div>
<div class="modal" *ngIf="modalAbierto">
  <h3 class="modal-titulo">{{ modoEditar ? 'Editar Módulo' : 'Agregar Módulo' }}</h3>

  <div class="campo">
    <label>Nombre*</label>
    <input type="text" [(ngModel)]="form.nombre_m" placeholder="Nombre*"/>
  </div>
  <div class="campo">
    <label>Descripción*</label>
    <input type="text" [(ngModel)]="form.descripcion_m" placeholder="Descripción*"/>
  </div>
  <div class="campo">
    <label>Área</label>
    <select [(ngModel)]="form.id_area">
      <option [ngValue]="null">Área</option>
      <option *ngFor="let a of areas" [ngValue]="a.id_area">{{ a.nombre_area }}</option>
    </select>
  </div>

  <div class="modal-acciones">
    <button class="btn-cancelar" (click)="cerrarModal()">Cancelar</button>
    <button class="btn-guardar" (click)="guardar()">Guardar</button>
  </div>
</div>
